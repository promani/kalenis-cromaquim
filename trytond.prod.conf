; Configuración de producción (Cloudflare Containers)
; La URI de la base llega por env: TRYTOND_database__uri

[web]
listen = 0.0.0.0:8000

; Adjuntos guardados en la base (Supabase), no en disco: el disco del
; contenedor es efímero. Persisten a reinicios/redeploys del contenedor.
[attachment]
filestore = False
